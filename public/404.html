<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>IRIMEP</title>
    <script type="text/javascript">
      // Redireciona qualquer rota 404 para o index.html mantendo a rota do React Router
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/') +
        (l.search ? '&q=' + l.search.slice(1) : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
