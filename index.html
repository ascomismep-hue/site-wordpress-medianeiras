<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRIMEP - Instituto das Irmãs Medianeiras da Paz</title>
    <style>
        :root {
            --azul: #0056a8;
            --vermelho: #e62134;
            --dourado: #c49a54;
        }

        body { font-family: 'Segoe UI', sans-serif; background: #fdfdfd; margin: 0; color: #333; }

        /* Estilo de Vidro (Glass) e Flutuação */
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            transition: all 0.4s ease;
        }

        .glass-card:hover {
            transform: translateY(-15px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        /* Layout */
        header { padding: 20px 10%; display: flex; justify-content: space-between; align-items: center; background: white; }
        .hero { width: 100%; height: 400px; background: var(--azul); color: white; display: flex; align-items: center; justify-content: center; text-align: center; }
        .container { padding: 50px 10%; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }

        /* Mapa e Busca */
        .mapa-section { display: flex; align-items: center; gap: 50px; padding: 50px 10%; background: #f0f2f5; }
        .mapa-img { width: 400px; }
        
        .btn-acao { background: var(--vermelho); color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>

    <header>
        <img src="LOGO_IRIMEP" style="height: 50px;">
        <nav>Home | Institucional | Atuação | Unidades | Blog</nav>
    </header>

    <div class="hero">
        <h1>IRIMEP - Medianeiras da Paz</h1>
    </div>

    <!-- Atalhos Rápidos (Glassmorphism) -->
    <div class="container">
        <div class="glass-card"><h3>Quem Somos</h3></div>
        <div class="glass-card"><h3>Transparência</h3></div>
        <div class="glass-card"><h3>Atuação</h3></div>
        <div class="glass-card"><h3>Notícias</h3></div>
    </div>

    <!-- Mapa e Busca -->
    <section class="mapa-section">
        <div class="mapa-img">
            <img src="LINK_DO_SEU_MAPA.svg" alt="Mapa Nordeste">
        </div>
        <div class="glass-card">
            <h3>Unidades - Onde estamos</h3>
            <input type="text" placeholder="Digite a unidade...">
            <button>Buscar</button>
        </div>
    </section>

</body>
</html>
