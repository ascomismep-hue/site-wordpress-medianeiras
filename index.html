<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRIMEP - Irmãs Medianeiras da Paz</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --cor-vermelho: #e31e24;
            --cor-azul: #008cc9;
            --cor-ouro: #d48f43;
            --cor-preto: #333;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; color: var(--cor-preto); }

        header { padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo-img { height: 60px; }

        .banner { width: 100%; height: 80vh; background: #ddd; display: flex; align-items: flex-end; justify-content: center; }
        
        .menu-atuacao { display: flex; gap: 20px; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); transform: translateY(50%); }
        .item-menu { width: 120px; padding: 15px; background: var(--cor-azul); color: white; border-radius: 5px; text-align: center; cursor: pointer; transition: 0.3s; }
        .item-menu:hover { transform: translateY(-10px); background: var(--cor-vermelho); }

        #secao-mapa { padding: 100px 5%; text-align: center; }
        
        /* Estilos do Mapa */
        svg { width: 100%; max-width: 600px; fill: #ccc; }
        /* Apenas cidades autorizadas ficam coloridas e com cursor pointer */
        path#mun_2611606, path#mun_2601102, path#mun_2611101 { 
            fill: var(--cor-ouro); 
            cursor: pointer; 
        }
        path#mun_2611606:hover, path#mun_2601102:hover, path#mun_2611101:hover { 
            fill: var(--cor-vermelho); 
        }
    </style>
</head>
<body>

    <header>
        <img src="imagens/logo.png" alt="Logo IRIMEP" class="logo-img">
        <nav>
            <a href="#">Início</a> | <a href="#">Contato</a>
        </nav>
    </header>

    <div class="banner">
        <div class="menu-atuacao">
            <div class="item-menu"><i class="fas fa-graduation-cap"></i><br>Educação</div>
            <div class="item-menu"><i class="fas fa-heartbeat"></i><br>Saúde</div>
            <div class="item-menu"><i class="fas fa-users"></i><br>Social</div>
            <div class="item-menu"><i class="fas fa-church"></i><br>Religioso</div>
        </div>
    </div>

    <section id="secao-mapa">
        <h2>Onde estamos em Pernambuco</h2>
        <!-- Substitua o SVG abaixo pelo seu arquivo completo -->
        <svg viewBox="0 0 1000 390">
            <!-- Certifique-se que os paths tenham os IDs: mun_2611606, mun_2601102, mun_2611101 -->
            <path id="mun_2611606" d="..." /> 
        </svg>
    </section>

    <script>
        document.querySelectorAll('path').forEach(path => {
            path.addEventListener('click', (e) => {
                const id = e.target.id;
                if(id === "mun_2611606") alert("Você clicou em Recife!");
                else if(id === "mun_2601102") alert("Você clicou em Araripina!");
                else if(id === "mun_2611101") alert("Você clicou em Petrolina!");
            });
        });
    </script>
</body>
</html>
