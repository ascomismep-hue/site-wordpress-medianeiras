<section class="secao-noticias-home">
    <h2 style="text-align: center; margin-bottom: 40px;">Últimas Notícias</h2>
    <div id="grid-index-supabase" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px;">
        <p style="text-align: center;">Carregando atualizações...</p>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const cliente = supabase.createClient("SUA_URL_SUPABASE", "SUA_CHAVE_ANON");

    async function carregarUltimasNoticias() {
        const grid = document.getElementById("grid-index-supabase");
        const { data: noticias, error } = await cliente
            .from('noticias')
            .select('*')
            .order('created_at', { ascending: false })
            .limit(3);

        if (error || !noticias || noticias.length === 0) {
            grid.innerHTML = "<p>Nenhuma notícia disponível no momento.</p>";
            return;
        }

        grid.innerHTML = noticias.map(n => `
            <article class="card-noticia">
                ${n.imagem_url ? `<img src="${n.imagem_url}" alt="${n.titulo}">` : ''}
                <div class="card-conteudo">
                    <h3 style="margin: 0 0 10px 0;">${n.titulo}</h3>
                    <a href="/detalhe-noticia?id=${n.id}" class="btn-leitura">Ler mais →</a>
                </div>
            </article>
        `).join('');
    }
    carregarUltimasNoticias();
</script>
