---
layout: default
title: Painel Administrativo
permalink: /admin/
---

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<div id="login-admin-container" class="login-wrapper">
    <div class="card-login">
        <h3>Acesso Administrativo</h3>
        <input type="email" id="email-admin" placeholder="Seu e-mail cadastrado">
        <input type="password" id="senha-admin" placeholder="Sua senha">
        <button onclick="realizarLogin()" class="btn-admin-geral">Entrar</button>
        <div id="erro-login" class="erro-mensagem"></div>
    </div>
</div>

<div id="painel-admin-principal" class="admin-dashboard" style="display: none;">
    <aside class="sidebar-admin">
        <div class="perfil-admin">
            <i class="fas fa-user-circle"></i>
            <span>Administração</span>
        </div>
        <button class="nav-admin-btn ativa" onclick="alternarPainel(event, 'aba-nova-noticia')">
            <i class="fas fa-newspaper"></i> Publicar Notícia
        </button>
        <button class="nav-admin-btn" onclick="alternarPainel(event, 'aba-mensagens-contato')">
            <i class="fas fa-envelope-open-text"></i> Contactos (<span id="count-contatos">0</span>)
        </button>
        <button class="nav-admin-btn" onclick="alternarPainel(event, 'aba-gracas-recebidas')">
            <i class="fas fa-dove"></i> Graças (<span id="count-gracas">0</span>)
        </button>
    </aside>

    <main class="conteudo-admin">
        <div id="aba-nova-noticia" class="modulo-admin ativa">
            <h2>Publicar Nova Notícia</h2>
            <p>Preencha os campos para gerar o arquivo Markdown.</p>
            <form class="form-admin-estrutura" onsubmit="gerarMarkdownNoticia(event)">
                </form>
        </div>

        <div id="aba-mensagens-contato" class="modulo-admin">
            <h2>Mensagens de Contato</h2>
            <div class="tabela-responsiva">
                <table>
                    <thead>
                        <tr><th>Data</th><th>Nome</th><th>E-mail</th><th>Mensagem</th></tr>
                    </thead>
                    <tbody id="tabela-contatos-body"></tbody>
                </table>
            </div>
        </div>

        <div id="aba-gracas-recebidas" class="modulo-admin">
            <h2>Testemunhos de Graças</h2>
            <div class="tabela-responsiva">
                <table>
                    <thead>
                        <tr><th>Data</th><th>Nome</th><th>Cidade</th><th>Relato</th></tr>
                    </thead>
                    <tbody id="tabela-gracas-body"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script>
    const SUPABASE_URL = "https://epiofzncgvmjhpgwrqga.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVwaW9mem5jZ3ZtamhwZ3dycWdhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwOTA2NDAsImV4cCI6MjA5OTY2NjY0MH0.PL_xurBbpf_x34URIH9AT9gewgxZDcow-ptGsxzrhxM";
    const clienteSupabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function realizarLogin() {
        const email = document.getElementById("email-admin").value;
        const senha = document.getElementById("senha-admin").value;
        try {
            const { error } = await clienteSupabase.auth.signInWithPassword({ email, password: senha });
            if (error) throw error;
            document.getElementById("login-admin-container").style.display = "none";
            document.getElementById("painel-admin-principal").style.display = "flex";
            carregarDadosSupabase();
        } catch (e) {
            alert("Erro no login: " + e.message);
        }
    }

    async function carregarDadosSupabase() {
        // Carrega Contatos
        const { data: contatos } = await clienteSupabase.from('contactos').select('*');
        document.getElementById("count-contatos").textContent = contatos ? contatos.length : 0;
        document.getElementById("tabela-contatos-body").innerHTML = contatos?.map(c => 
            `<tr><td>${new Date(c.created_at).toLocaleDateString()}</td><td>${c.nome}</td><td>${c.email}</td><td>${c.mensagem}</td></tr>`
        ).join('') || '<tr><td>Nenhum dado</td></tr>';

        // Carrega Graças
        const { data: gracas } = await clienteSupabase.from('gracas').select('*');
        document.getElementById("count-gracas").textContent = gracas ? gracas.length : 0;
        document.getElementById("tabela-gracas-body").innerHTML = gracas?.map(g => 
            `<tr><td>${new Date(g.created_at).toLocaleDateString()}</td><td>${g.nome}</td><td>${g.cidade}</td><td>${g.relato}</td></tr>`
        ).join('') || '<tr><td>Nenhum dado</td></tr>';
    }

    function alternarPainel(evento, idModulo) {
        document.querySelectorAll('.modulo-admin').forEach(m => m.classList.remove('ativa'));
        document.querySelectorAll('.nav-admin-btn').forEach(b => b.classList.remove('ativa'));
        document.getElementById(idModulo).classList.add('ativa');
        evento.currentTarget.classList.add('ativa');
    }
</script>
