---
layout: default
title: Painel Administrativo
permalink: /admin/
---
<style>
    :root { --cor-azul: #008cc9; --cor-vermelho: #e31e24; --cor-preto: #1a1a1a; }
    .login-wrapper { display: flex; justify-content: center; padding: 80px 20px; background: #f4f7f6; min-height: 80vh; }
    .card-login { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; border-top: 6px solid var(--cor-azul); }
    .card-login input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
    .admin-dashboard { display: flex; max-width: 1200px; margin: 20px auto; background: #fff; border-radius: 12px; overflow: hidden; min-height: 500px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
    .sidebar-admin { width: 280px; background: #2d3748; color: #fff; padding: 20px; }
    .nav-admin-btn { display: block; width: 100%; padding: 15px; background: none; border: none; color: #cbd5e0; text-align: left; cursor: pointer; transition: 0.3s; }
    .nav-admin-btn.ativa, .nav-admin-btn:hover { background: var(--cor-azul); color: #fff; }
    .conteudo-admin { flex: 1; padding: 30px; }
    .modulo-admin { display: none; }
    .modulo-admin.ativa { display: block; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 15px; border-bottom: 1px solid #edf2f7; text-align: left; }
    .btn-admin-geral { background: var(--cor-azul); color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; margin: 2px; }
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<div id="login-admin-container" class="login-wrapper">
    <div class="card-login">
        <h3>Acesso Administrativo</h3>
        <input type="email" id="email-admin" placeholder="E-mail">
        <input type="password" id="senha-admin" placeholder="Senha">
        <button onclick="realizarLogin()" class="btn-admin-geral" style="width:100%">Entrar</button>
        <p id="erro-login" style="color:red; margin-top:10px;"></p>
    </div>
</div>

<div id="painel-admin-principal" class="admin-dashboard" style="display: none;">
    <aside class="sidebar-admin">
        <h3 style="margin-bottom: 20px;">Painel</h3>
        <button class="nav-admin-btn ativa" onclick="alternarPainel(event, 'aba-contatos')">Mensagens (<span id="count-contatos">0</span>)</button>
        <button class="nav-admin-btn" onclick="alternarPainel(event, 'aba-gracas')">Graças (<span id="count-gracas">0</span>)</button>
        <button class="nav-admin-btn" onclick="alternarPainel(event, 'aba-noticias')">Publicar Notícias</button>
        <button class="nav-admin-btn" onclick="alternarPainel(event, 'aba-agenda')">Agenda</button>
    </aside>

    <main class="conteudo-admin">
        <div id="aba-contatos" class="modulo-admin ativa">
            <h2>Mensagens de Contato</h2>
            <table>
                <thead><tr><th>Status</th><th>Protocolo</th><th>Nome</th><th>Mensagem</th><th>Ações</th></tr></thead>
                <tbody id="tabela-contatos-body"></tbody>
            </table>
        </div>

        <div id="aba-gracas" class="modulo-admin"><h2>Graças Recebidas</h2></div>

        <div id="aba-noticias" class="modulo-admin">
            <h2>Publicar Notícia</h2>
            <div style="display:flex; flex-direction:column; gap:15px; max-width: 500px;">
                <input type="text" id="titulo-noticia" placeholder="Título" style="padding:10px;">
                <input type="file" id="upload-imagem" accept="image/*">
                <textarea id="texto-noticia" placeholder="Conteúdo..." style="padding:10px; height:150px;"></textarea>
                <button onclick="publicarNoticia()" class="btn-admin-geral" style="background:green;">Publicar</button>
            </div>
        </div>

        <div id="aba-agenda" class="modulo-admin">
            <h2>Incluir na Agenda</h2>
            <input type="text" id="titulo-agenda" placeholder="Título" style="width:100%; padding:10px; margin-bottom:10px;">
            <select id="tipo-agenda" style="width:100%; padding:10px; margin-bottom:10px;">
                <option value="Geral">Geral</option>
                <option value="Madre">Madre</option>
            </select>
            <input type="date" id="data-agenda" style="width:100%; padding:10px; margin-bottom:10px;">
            <textarea id="desc-agenda" placeholder="Descrição" style="width:100%; padding:10px;"></textarea>
            <button onclick="salvarAgenda()" class="btn-admin-geral" style="margin-top:10px;">Salvar Compromisso</button>
        </div>
    </main>
</div>

<script>
    const SUPABASE_URL = "https://epiofzncgvmjhpgwrqga.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVwaW9mem5jZ3ZtamhwZ3dycWdhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwOTA2NDAsImV4cCI6MjA5OTY2NjY0MH0.PL_xurBbpf_x34URIH9AT9gewgxZDcow-ptGsxzrhxM";
    const cliente = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let protocoloAtual = "";

    async function realizarLogin() {
        const { error } = await cliente.auth.signInWithPassword({ 
            email: document.getElementById("email-admin").value, 
            password: document.getElementById("senha-admin").value 
        });
        if (error) { document.getElementById("erro-login").innerText = error.message; return; }
        document.getElementById("login-admin-container").style.display = "none";
        document.getElementById("painel-admin-principal").style.display = "flex";
        carregarDados();
    }

    async function carregarDados() {
        const { data: contatos } = await cliente.from('contactos').select('*');
        document.getElementById("count-contatos").innerText = contatos?.length || 0;
        document.getElementById("tabela-contatos-body").innerHTML = contatos?.map(c => `
            <tr><td>${c.status || 'pendente'}</td><td>${c.protocolo}</td><td>${c.nome}</td><td>${c.mensagem.substring(0, 30)}...</td>
            <td><button onclick="abrirHistorico('${c.protocolo}')" class="btn-admin-geral">Ver</button></td></tr>`).join('');
    }

    async function publicarNoticia() {
        const file = document.getElementById("upload-imagem").files[0];
        if (!file) return alert("Selecione uma imagem!");
        const fileName = `${Math.random()}_${file.name}`;
        const { error: uploadError } = await cliente.storage.from('imagens').upload(fileName, file);
        if (uploadError) return alert("Erro no upload: " + uploadError.message);
        const { data: urlData } = cliente.storage.from('imagens').getPublicUrl(fileName);
        await cliente.from('noticias').insert([{ titulo: document.getElementById("titulo-noticia").value, imagem_url: urlData.publicUrl, texto: document.getElementById("texto-noticia").value }]);
        alert("Notícia publicada!");
    }

    async function salvarAgenda() {
        const { error } = await cliente.from('agenda').insert([{
            titulo: document.getElementById("titulo-agenda").value,
            tipo: document.getElementById("tipo-agenda").value,
            data_inicio: document.getElementById("data-agenda").value,
            descricao: document.getElementById("desc-agenda").value
        }]);
        if(error) alert("Erro: " + error.message);
        else alert("Compromisso agendado!");
    }

    function alternarPainel(evt, id) {
        document.querySelectorAll('.modulo-admin').forEach(m => m.classList.remove('ativa'));
        document.getElementById(id).classList.add('ativa');
    }
</script>
