---
layout: default
title: Painel Administrativo
permalink: /admin/
---

<style>
    :root { --cor-azul: #008cc9; --cor-vermelho: #e31e24; --cor-preto: #1a1a1a; }
    .admin-dashboard { display: flex; max-width: 1200px; margin: 20px auto; background: #fff; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
    .sidebar-admin { width: 280px; background: #2d3748; color: #fff; padding: 20px; }
    .nav-admin-btn { display: block; width: 100%; padding: 15px; background: none; border: none; color: #cbd5e0; text-align: left; cursor: pointer; }
    .nav-admin-btn.ativa { background: var(--cor-azul); color: #fff; }
    .conteudo-admin { flex: 1; padding: 30px; }
    .modulo-admin { display: none; }
    .modulo-admin.ativa { display: block; }
    .btn-admin-geral { background: var(--cor-azul); color: #fff; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; margin: 2px; }
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<div id="login-admin-container" class="login-wrapper">...</div> <div id="painel-admin-principal" class="admin-dashboard" style="display: none;">
    <aside class="sidebar-admin">
        <button class="nav-admin-btn ativa" onclick="alternarPainel(event, 'aba-contatos')">Mensagens</button>
    </aside>
    <main class="conteudo-admin">
        <div id="aba-contatos" class="modulo-admin ativa">
            <h2>Mensagens de Contato</h2>
            <table>
                <thead><tr><th>Data</th><th>Status</th><th>Protocolo</th><th>Nome</th><th>Ação</th></tr></thead>
                <tbody id="tabela-contatos-body"></tbody>
            </table>
        </div>
    </main>
</div>

<div id="modal-resposta" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); justify-content:center; align-items:center; z-index: 1000;">
    <div style="background:#fff; padding:30px; border-radius:16px; width:500px; max-height: 80vh; overflow-y: auto;">
        <h3 id="modal-titulo">Histórico e Resposta</h3>
        <div id="resultado-historico" style="margin-bottom: 20px; font-size: 14px; border-bottom: 1px solid #eee; padding-bottom: 10px;"></div>
        <textarea id="texto-resposta" style="width:100%; height:80px; padding:10px; border-radius:8px; border:1px solid #ddd;"></textarea>
        <div style="text-align:right; margin-top:15px;">
            <button onclick="fecharModal()" class="btn-admin-geral" style="background:#666;">Fechar</button>
            <button onclick="enviarRespostaModal()" class="btn-admin-geral">Enviar Resposta</button>
        </div>
    </div>
</div>

<script>
    const cliente = supabase.createClient("https://epiofzncgvmjhpgwrqga.supabase.co", "SUA_KEY_AQUI");
    let protocoloAtual = "";

    async function carregarDados() {
        const { data: contatos } = await cliente.from('contactos').select('*');
        document.getElementById("tabela-contatos-body").innerHTML = contatos?.map(c => `
            <tr>
                <td>${new Date(c.created_at).toLocaleDateString()}</td>
                <td>${c.status || 'pendente'}</td>
                <td>${c.protocolo}</td>
                <td>${c.nome}</td>
                <td>
                    <button onclick="abrirHistorico('${c.protocolo}')" class="btn-admin-geral">Ver</button>
                    <button onclick="finalizarProtocolo('${c.protocolo}')" class="btn-admin-geral" style="background:green">Finalizar</button>
                </td>
            </tr>`).join('');
    }

    async function abrirHistorico(protocolo) {
        protocoloAtual = protocolo;
        const { data: msg } = await cliente.from('contactos').select('mensagem').eq('protocolo', protocolo).single();
        const { data: chat } = await cliente.from('respostas').select('*').eq('protocolo', protocolo);
        
        document.getElementById('modal-titulo').innerText = "Protocolo: " + protocolo;
        document.getElementById('resultado-historico').innerHTML = `
            <p><strong>Cliente:</strong> ${msg.mensagem}</p>
            ${chat?.map(c => `<p><em>${c.enviado_por}:</em> ${c.mensagem_resposta}</p>`).join('') || '<p>Sem respostas ainda.</p>'}
        `;
        document.getElementById('modal-resposta').style.display = "flex";
    }

    async function enviarRespostaModal() {
        const resposta = document.getElementById('texto-resposta').value;
        if (!resposta) return alert("Escreva uma resposta!");

        await cliente.from('respostas').insert([{ 
            protocolo: protocoloAtual, 
            mensagem_resposta: resposta, 
            enviado_por: "Administrador" 
        }]);
        
        alert("Enviado!");
        fecharModal();
        carregarDados();
    }

    async function finalizarProtocolo(protocolo) {
        if(!confirm("Finalizar este protocolo?")) return;
        await cliente.from('contactos').update({ status: 'finalizado' }).eq('protocolo', protocolo);
        carregarDados();
    }

    function fecharModal() { document.getElementById('modal-resposta').style.display = "none"; }
</script>
