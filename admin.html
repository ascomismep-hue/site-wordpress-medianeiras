---
layout: default
title: Painel Administrativo
permalink: /admin/
---
<style>
    /* Estilos do Tema do Painel */
    :root {
        --cor-azul: #008cc9;
        --cor-vermelho: #e31e24;
        --cor-ouro: #d48f43;
        --cor-preto: #1a1a1a;
    }
    .login-wrapper { display: flex; justify-content: center; padding: 80px 0; background-color: #f8fafc; }
    .card-login { background: #ffffff; padding: 40px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); text-align: center; max-width: 400px; width: 100%; border-top: 5px solid var(--cor-azul); }
    
    .admin-dashboard { display: flex; max-width: 1300px; margin: 30px auto; background: #ffffff; border-radius: 8px; box-shadow: 0 4px 25px rgba(0,0,0,0.05); overflow: hidden; min-height: 600px; border: 1px solid #e2e8f0; }
    .sidebar-admin { width: 260px; background-color: #1e293b; padding: 25px 0; display: flex; flex-direction: column; }
    .nav-admin-btn { background: none; border: none; padding: 14px 20px; color: #94a3b8; text-align: left; font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 12px; }
    .nav-admin-btn.ativa { color: #ffffff; background-color: var(--cor-azul); }
    
    .conteudo-admin { flex: 1; padding: 40px; }
    .modulo-admin { display: none; }
    .modulo-admin.ativa { display: block; }
    
    .tabela-responsiva { width: 100%; overflow-x: auto; border: 1px solid #e2e8f0; border-radius: 6px; }
    table { width: 100%; border-collapse: collapse; }
    th { background-color: #f8fafc; padding: 14px; text-align: left; }
    td { padding: 12px; border-bottom: 1px solid #eee; }
    
    .btn-admin-geral { background-color: var(--cor-azul); color: #fff; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; }
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<div id="login-admin-container" class="login-wrapper">
    <div class="card-login">
        <h3>Acesso Administrativo</h3>
        <input type="email" id="email-admin" placeholder="Seu e-mail cadastrado">
        <input type="password" id="senha-admin" placeholder="Sua senha">
        <button onclick="realizarLogin()" class="btn-admin-geral">Entrar</button>
        <div id="erro-login" class="erro-mensagem"></div>
    </div>
</div>

<div id="painel-admin-principal" class="admin-dashboard" style="display: none;">
    <aside class="sidebar-admin">
        <div class="perfil-admin">
            <i class="fas fa-user-circle"></i>
            <span>Administração</span>
        </div>
        <button class="nav-admin-btn ativa" onclick="alternarPainel(event, 'aba-nova-noticia')">
            <i class="fas fa-newspaper"></i> Publicar Notícia
        </button>
        <button class="nav-admin-btn" onclick="alternarPainel(event, 'aba-mensagens-contato')">
            <i class="fas fa-envelope-open-text"></i> Contactos (<span id="count-contatos">0</span>)
        </button>
        <button class="nav-admin-btn" onclick="alternarPainel(event, 'aba-gracas-recebidas')">
            <i class="fas fa-dove"></i> Graças (<span id="count-gracas">0</span>)
        </button>
    </aside>

    <main class="conteudo-admin">
        <div id="aba-nova-noticia" class="modulo-admin ativa">
            <h2>Publicar Nova Notícia</h2>
            <p>Preencha os campos para gerar o arquivo Markdown.</p>
            <form class="form-admin-estrutura" onsubmit="gerarMarkdownNoticia(event)">
                </form>
        </div>

        <div id="aba-mensagens-contato" class="modulo-admin">
            <h2>Mensagens de Contato</h2>
            <div class="tabela-responsiva">
                <table>
                    <thead>
                        <tr><th>Data</th><th>Nome</th><th>E-mail</th><th>Mensagem</th></tr>
                    </thead>
                    <tbody id="tabela-contatos-body"></tbody>
                </table>
            </div>
        </div>

        <div id="aba-gracas-recebidas" class="modulo-admin">
            <h2>Testemunhos de Graças</h2>
            <div class="tabela-responsiva">
                <table>
                    <thead>
                        <tr><th>Data</th><th>Nome</th><th>Cidade</th><th>Relato</th></tr>
                    </thead>
                    <tbody id="tabela-gracas-body"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // 1. Defina as constantes
    const SUPABASE_URL = "https://wocbbywzbygajphunfxe.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndvY2JieXd6YnlnYWpwaHVuZnhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDU5NTM1NzIsImV4cCI6MjA2MTUzMzU3Mn0.b5z-I9hKkR093b1N86XbN3Zf0T9u-K-X6v7p9j4u-m0";

    // 2. Inicialize o cliente no escopo global (fora da função)
    const clienteSupabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 3. A função agora usa 'clienteSupabase' que foi definido acima
    async function enviarContato(event) {
        event.preventDefault();
        
        const nome = document.getElementById("nome").value;
        const email = document.getElementById("email").value;
        const assunto = document.getElementById("assunto").value;
        const mensagem = document.getElementById("mensagem").value;
        const msgSucesso = document.getElementById("msg-contato-sucesso");

        try {
            // Agora 'clienteSupabase' está disponível e definido
            const { error } = await clienteSupabase
                .from('contactos')
                .insert([{ nome, email, assunto, mensagem }]);

            if (error) throw error;

            msgSucesso.style.display = "block";
            document.getElementById("form-contato").reset();
            msgSucesso.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

        } catch (error) {
            console.error("Erro Supabase:", error);
            alert("Erro ao enviar mensagem: " + error.message);
        }
    }
</script>
