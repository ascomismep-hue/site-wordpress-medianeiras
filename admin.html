---
layout: default
title: Painel Administrativo
permalink: /admin/
---
<style>
    :root { --cor-azul: #008cc9; --cor-vermelho: #e31e24; --cor-preto: #1a1a1a; }
    .login-wrapper { display: flex; justify-content: center; padding: 80px 20px; background: #f4f7f6; min-height: 80vh; }
    .card-login { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; border-top: 6px solid var(--cor-azul); }
    .card-login input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
    
    .admin-dashboard { display: flex; max-width: 1200px; margin: 20px auto; background: #fff; border-radius: 12px; overflow: hidden; min-height: 500px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
    .sidebar-admin { width: 280px; background: #2d3748; color: #fff; padding: 20px; }
    .nav-admin-btn { display: block; width: 100%; padding: 15px; background: none; border: none; color: #cbd5e0; text-align: left; cursor: pointer; transition: 0.3s; }
    .nav-admin-btn.ativa, .nav-admin-btn:hover { background: var(--cor-azul); color: #fff; }
    .conteudo-admin { flex: 1; padding: 30px; }
    .modulo-admin { display: none; }
    .modulo-admin.ativa { display: block; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 15px; border-bottom: 1px solid #edf2f7; text-align: left; }
    .btn-admin-geral { background: var(--cor-azul); color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; margin: 2px; }
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<div id="login-admin-container" class="login-wrapper">
    <div class="card-login">
        <h3>Acesso Administrativo</h3>
        <input type="email" id="email-admin" placeholder="E-mail">
        <input type="password" id="senha-admin" placeholder="Senha">
        <button onclick="realizarLogin()" class="btn-admin-geral" style="width:100%">Entrar</button>
        <p id="erro-login" style="color:red; margin-top:10px;"></p>
    </div>
</div>

<div id="painel-admin-principal" class="admin-dashboard" style="display: none;">
    <aside class="sidebar-admin">
        <h3 style="margin-bottom: 20px;">Painel</h3>
        <button class="nav-admin-btn ativa" onclick="alternarPainel(event, 'aba-contatos')">Mensagens (<span id="count-contatos">0</span>)</button>
        <button class="nav-admin-btn" onclick="alternarPainel(event, 'aba-gracas')">Graças (<span id="count-gracas">0</span>)</button>
        <button class="nav-admin-btn" onclick="alternarPainel(event, 'aba-noticias')">Publicar Notícias</button>
    </aside>

    <main class="conteudo-admin">
        <div id="aba-contatos" class="modulo-admin ativa">
            <h2>Mensagens de Contato</h2>
            <table>
                <thead><tr><th>Status</th><th>Protocolo</th><th>Nome</th><th>Mensagem</th><th>Ações</th></tr></thead>
                <tbody id="tabela-contatos-body"></tbody>
            </table>
        </div>

        <div id="aba-gracas" class="modulo-admin">
            <h2>Graças Recebidas</h2>
            <table>
                <thead><tr><th>Data</th><th>Nome</th><th>Cidade</th><th>Relato</th></tr></thead>
                <tbody id="tabela-gracas-body"></tbody>
            </table>
        </div>
    </main>
</div>

<div id="modal-resposta" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); justify-content:center; align-items:center; z-index: 1000;">
    <div style="background:#fff; padding:30px; border-radius:16px; width:500px; max-height: 80vh; overflow-y: auto;">
        <h3 id="modal-titulo">Histórico e Resposta</h3>
        <div id="resultado-historico" style="margin-bottom: 20px; font-size: 14px; border-bottom: 1px solid #eee; padding-bottom: 10px;"></div>
        <textarea id="texto-resposta" placeholder="Digite sua resposta aqui..." style="width:100%; height:80px; padding:10px; border-radius:8px; border:1px solid #ddd;"></textarea>
        <div style="text-align:right; margin-top:15px;">
            <button onclick="fecharModal()" class="btn-admin-geral" style="background:#666;">Fechar</button>
            <button onclick="enviarRespostaModal()" class="btn-admin-geral">Enviar Resposta</button>
        </div>
    </div>
</div>

<div id="aba-noticias" class="modulo-admin">
    <h2>Publicar Notícia</h2>
    <div style="display:flex; flex-direction:column; gap:10px; max-width: 500px;">
        <input type="text" id="titulo-noticia" placeholder="Título da Notícia" style="padding:10px;">
        <input type="text" id="link-img-noticia" placeholder="Link da Imagem" style="padding:10px;">
        <textarea id="texto-noticia" placeholder="Conteúdo da notícia..." style="padding:10px; height:150px;"></textarea>
        <button onclick="publicarNoticia()" class="btn-admin-geral" style="background:green;">Publicar Notícia</button>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://epiofzncgvmjhpgwrqga.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVwaW9mem5jZ3ZtamhwZ3dycWdhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwOTA2NDAsImV4cCI6MjA5OTY2NjY0MH0.PL_xurBbpf_x34URIH9AT9gewgxZDcow-ptGsxzrhxM";
    const cliente = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let protocoloAtual = "";

    async function realizarLogin() {
        const { error } = await cliente.auth.signInWithPassword({ 
            email: document.getElementById("email-admin").value, 
            password: document.getElementById("senha-admin").value 
        });
        if (error) { document.getElementById("erro-login").innerText = error.message; return; }
        document.getElementById("login-admin-container").style.display = "none";
        document.getElementById("painel-admin-principal").style.display = "flex";
        carregarDados();
    }

    async function carregarDados() {
        const { data: contatos } = await cliente.from('contactos').select('*');
        document.getElementById("count-contatos").innerText = contatos?.length || 0;
        document.getElementById("tabela-contatos-body").innerHTML = contatos?.map(c => `
            <tr>
                <td><strong>${c.status || 'pendente'}</strong></td>
                <td>${c.protocolo}</td>
                <td>${c.nome}</td>
                <td>${c.mensagem.substring(0, 30)}...</td>
                <td>
                    <button onclick="abrirHistorico('${c.protocolo}')" class="btn-admin-geral">Ver</button>
                    <button onclick="finalizarProtocolo('${c.protocolo}')" class="btn-admin-geral" style="background:green">Finalizar</button>
                </td>
            </tr>`).join('');
    }

    async function abrirHistorico(protocolo) {
        protocoloAtual = protocolo;
        const { data: msg } = await cliente.from('contactos').select('mensagem').eq('protocolo', protocolo).single();
        const { data: chat } = await cliente.from('respostas').select('*').eq('protocolo', protocolo);
        
        document.getElementById('modal-titulo').innerText = "Protocolo: " + protocolo;
        document.getElementById('resultado-historico').innerHTML = `
            <p><strong>Cliente:</strong> ${msg.mensagem}</p>
            ${chat?.map(c => `<p><em>${c.enviado_por}:</em> ${c.mensagem_resposta}</p>`).join('') || '<p>Sem respostas ainda.</p>'}
        `;
        document.getElementById('modal-resposta').style.display = "flex";
    }

    async function enviarRespostaModal() {
        const resposta = document.getElementById('texto-resposta').value;
        if (!resposta) return alert("Escreva algo!");
        await cliente.from('respostas').insert([{ protocolo: protocoloAtual, mensagem_resposta: resposta, enviado_por: "Administrador" }]);
        alert("Enviado!");
        fecharModal();
        carregarDados();
    }

    async function finalizarProtocolo(protocolo) {
    if(!confirm("Tem certeza que deseja finalizar este protocolo?")) return;
    
    // O comando de update precisa do eq('protocolo', protocolo)
    const { error } = await cliente
        .from('contactos')
        .update({ status: 'finalizado' })
        .eq('protocolo', protocolo);

    if (error) {
        alert("Erro ao finalizar: " + error.message);
    } else {
        alert("Protocolo finalizado com sucesso!");
        carregarDados(); // Recarrega a tabela
    }
}

    function fecharModal() { document.getElementById('modal-resposta').style.display = "none"; }
    function alternarPainel(evt, id) {
        document.querySelectorAll('.modulo-admin').forEach(m => m.classList.remove('ativa'));
        document.querySelectorAll('.nav-admin-btn').forEach(b => b.classList.remove('ativa'));
        document.getElementById(id).classList.add('ativa');
        evt.currentTarget.classList.add('ativa');
    }

    async function publicarNoticia() {
    const titulo = document.getElementById("titulo-noticia").value;
    const imagem = document.getElementById("link-img-noticia").value;
    const texto = document.getElementById("texto-noticia").value;

    if (!titulo || !texto) return alert("Preencha o título e o conteúdo!");

    const { error } = await cliente.from('noticias').insert([{ 
        titulo: titulo, 
        imagem: imagem, 
        texto: texto,
        data: new Date().toISOString()
    }]);

    if (error) {
        alert("Erro ao publicar: " + error.message);
    } else {
        alert("Notícia publicada com sucesso!");
        document.getElementById("titulo-noticia").value = "";
        document.getElementById("texto-noticia").value = "";
    }
}
</script>
