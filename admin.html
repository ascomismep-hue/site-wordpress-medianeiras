---
layout: default
title: Painel Administrativo
permalink: /admin/
---
<style>
    :root { --cor-azul: #008cc9; --bg-claro: #f8fafc; --shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    body { background-color: var(--bg-claro); }
    
    .admin-container { max-width: 1200px; margin: 40px auto; display: grid; grid-template-columns: 280px 1fr; gap: 30px; padding: 0 20px; }
    
    .sidebar { background: #fff; padding: 25px; border-radius: 16px; box-shadow: var(--shadow); height: fit-content; }
    .nav-btn { display: flex; align-items: center; width: 100%; padding: 15px; margin-bottom: 8px; border: none; background: transparent; border-radius: 8px; cursor: pointer; font-weight: 600; color: #64748b; transition: 0.3s; }
    .nav-btn.ativa, .nav-btn:hover { background: #e0f2fe; color: var(--cor-azul); }
    
    .content-card { background: #fff; padding: 40px; border-radius: 16px; box-shadow: var(--shadow); }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 600; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; }
    
    .btn-save { background: var(--cor-azul); color: #fff; padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
</style>

<div id="painel-admin-principal" class="admin-container" style="display: none;">
    <aside class="sidebar">
        <h3 style="margin-bottom: 25px;">Gerenciamento</h3>
        <button class="nav-btn ativa" onclick="alternarPainel(event, 'aba-contatos')">📧 Mensagens</button>
        <button class="nav-btn" onclick="alternarPainel(event, 'aba-noticias')">📰 Publicar Notícia</button>
        <button class="nav-btn" onclick="alternarPainel(event, 'aba-agenda')">📅 Agenda</button>
    </aside>

    <main class="content-card">
        <!-- Notícias -->
        <div id="aba-noticias" class="modulo-admin" style="display:none;">
            <h2 style="margin-bottom: 25px;">Publicar Nova Notícia</h2>
            <div class="form-group"><label>Título</label><input type="text" id="titulo-noticia"></div>
            <div class="form-group"><label>Imagem</label><input type="file" id="upload-imagem" accept="image/*"></div>
            <div class="form-group"><label>Conteúdo</label><textarea id="texto-noticia" rows="5"></textarea></div>
            <button onclick="publicarNoticia()" class="btn-save">Publicar Agora</button>
        </div>

        <!-- Agenda -->
        <div id="aba-agenda" class="modulo-admin" style="display:none;">
            <h2 style="margin-bottom: 25px;">Adicionar à Agenda</h2>
            <div class="form-group"><label>Título</label><input type="text" id="titulo-agenda"></div>
            <div class="form-group"><label>Categoria</label><select id="tipo-agenda"><option>Geral</option><option>Madre</option></select></div>
            <div class="form-group"><label>Data</label><input type="date" id="data-agenda"></div>
            <button onclick="salvarAgenda()" class="btn-save">Salvar Compromisso</button>
        </div>
    </main>
</div>

<script>
    const SUPABASE_URL = "https://epiofzncgvmjhpgwrqga.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVwaW9mem5jZ3ZtamhwZ3dycWdhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwOTA2NDAsImV4cCI6MjA5OTY2NjY0MH0.PL_xurBbpf_x34URIH9AT9gewgxZDcow-ptGsxzrhxM";
    const cliente = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let protocoloAtual = "";

    async function realizarLogin() {
        const { error } = await cliente.auth.signInWithPassword({ 
            email: document.getElementById("email-admin").value, 
            password: document.getElementById("senha-admin").value 
        });
        if (error) { document.getElementById("erro-login").innerText = error.message; return; }
        document.getElementById("login-admin-container").style.display = "none";
        document.getElementById("painel-admin-principal").style.display = "flex";
        carregarDados();
    }

    async function carregarDados() {
        const { data: contatos } = await cliente.from('contactos').select('*');
        document.getElementById("count-contatos").innerText = contatos?.length || 0;
        document.getElementById("tabela-contatos-body").innerHTML = contatos?.map(c => `
            <tr><td>${c.status || 'pendente'}</td><td>${c.protocolo}</td><td>${c.nome}</td><td>${c.mensagem.substring(0, 30)}...</td>
            <td><button onclick="abrirHistorico('${c.protocolo}')" class="btn-admin-geral">Ver</button></td></tr>`).join('');
    }

    async function publicarNoticia() {
        const file = document.getElementById("upload-imagem").files[0];
        if (!file) return alert("Selecione uma imagem!");
        const fileName = `${Math.random()}_${file.name}`;
        const { error: uploadError } = await cliente.storage.from('imagens').upload(fileName, file);
        if (uploadError) return alert("Erro no upload: " + uploadError.message);
        const { data: urlData } = cliente.storage.from('imagens').getPublicUrl(fileName);
        await cliente.from('noticias').insert([{ titulo: document.getElementById("titulo-noticia").value, imagem_url: urlData.publicUrl, texto: document.getElementById("texto-noticia").value }]);
        alert("Notícia publicada!");
    }

    async function salvarAgenda() {
        const { error } = await cliente.from('agenda').insert([{
            titulo: document.getElementById("titulo-agenda").value,
            tipo: document.getElementById("tipo-agenda").value,
            data_inicio: document.getElementById("data-agenda").value,
            descricao: document.getElementById("desc-agenda").value
        }]);
        if(error) alert("Erro: " + error.message);
        else alert("Compromisso agendado!");
    }

    function alternarPainel(evt, id) {
        document.querySelectorAll('.modulo-admin').forEach(m => m.classList.remove('ativa'));
        document.getElementById(id).classList.add('ativa');
    }
</script>
