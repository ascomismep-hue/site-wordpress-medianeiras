---
layout: default
title: Contato
permalink: /contato/
---

<section class="secao-contato" style="padding: 40px 5% 100px 5%;">
    <div class="titulo-contato">
        <h2>Atendimento ao Público</h2>
    </div>

    <div class="contato-wrapper">
        <div class="contato-coluna">
            <div class="card-contato">
                <div style="display: flex; gap: 0; margin-bottom: 20px; border-radius: 8px; overflow: hidden;">
                    <button type="button" onclick="alternarAba('enviar', event)" class="tab-button active">Enviar Mensagem</button>
                    <button type="button" onclick="alternarAba('consultar', event)" class="tab-button">Consultar Protocolo</button>
                </div>

                <div id="aba-enviar" class="aba-atendimento">
                    <form id="form-contato" onsubmit="enviarContato(event)" class="form-institucional">
                        <div class="form-grupo"><label>Nome</label><input type="text" id="nome" required></div>
                        <div class="form-grupo"><label>E-mail</label><input type="email" id="email" required></div>
                        <div class="form-grupo"><label>Assunto</label><input type="text" id="assunto" required></div>
                        <div class="form-grupo"><label>Mensagem</label><textarea id="mensagem" rows="4" required></textarea></div>
                        <button type="submit" class="btn-enviar-contato">Enviar</button>
                        <div id="msg-contato-sucesso" class="mensagem-sucesso"></div>
                    </form>
                </div>

                <div id="aba-consultar" class="aba-atendimento" style="display:none;">
                    <h3>Consultar Status</h3>
                    <div class="form-grupo">
                        <input type="text" id="input-protocolo-consulta" placeholder="Ex: ISMEP123456#">
                        <button onclick="executarConsulta()" class="btn-enviar-contato">Verificar Status</button>
                    </div>
                    <div id="resultado-consulta" style="margin-top:20px;"></div>
                </div>
            </div>
        </div>
        
        <div class="contato-coluna">...</div>
    </div>
</section>

<style>
    .tab-button { flex: 1; padding: 15px; border: none; background: #f1f5f9; font-weight: bold; cursor: pointer; transition: 0.3s; }
    .tab-button.active { background: var(--cor-azul); color: white; }
    .chat-bubble { padding: 12px 16px; border-radius: 18px; margin-bottom: 10px; font-size: 14px; }
    .bubble-admin { background: var(--cor-azul); color: white; align-self: flex-end; }
    .bubble-user { background: #e2e8f0; color: #1a1a1a; align-self: flex-start; }
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = "https://epiofzncgvmjhpgwrqga.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVwaW9mem5jZ3ZtamhwZ3dycWdhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwOTA2NDAsImV4cCI6MjA5OTY2NjY0MH0.PL_xurBbpf_x34URIH9AT9gewgxZDcow-ptGsxzrhxM";
    const cliente = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function alternarAba(aba, event) {
        document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('aba-enviar').style.display = (aba === 'enviar') ? 'block' : 'none';
        document.getElementById('aba-consultar').style.display = (aba === 'consultar') ? 'block' : 'none';
    }

    async function executarConsulta() {
        const protocolo = document.getElementById('input-protocolo-consulta').value;
        const res = document.getElementById('resultado-consulta');
        res.innerHTML = "Buscando...";
        
        const { data: msg } = await cliente.from('contactos').select('*').eq('protocolo', protocolo).single();
        const { data: chat } = await cliente.from('respostas').select('*').eq('protocolo', protocolo);

        if (!msg) { res.innerHTML = "Protocolo não encontrado."; return; }
        
        res.innerHTML = `<div style="display:flex; flex-direction:column;">
            <div class="chat-bubble bubble-user"><strong>Você:</strong> ${msg.mensagem}</div>
            ${chat ? chat.map(c => `<div class="chat-bubble bubble-admin"><strong>Sede:</strong> ${c.mensagem_resposta}</div>`).join('') : ""}
        </div>`;

    async function enviarContato(event) {
        event.preventDefault();
        const protocolo = `ISMEP${Date.now().toString().slice(-6)}#`;
        try {
            const { error } = await cliente.from('contactos').insert([{ 
                nome: document.getElementById("nome").value, 
                email: document.getElementById("email").value, 
                assunto: document.getElementById("assunto").value, 
                mensagem: document.getElementById("mensagem").value,
                protocolo: protocolo 
            }]);
            if (error) throw error;
            const msg = document.getElementById("msg-contato-sucesso");
            msg.style.display = "block";
            msg.innerHTML = `Mensagem enviada! Seu protocolo é <strong>${protocolo}</strong>.`;
            document.getElementById("form-contato").reset();
        } catch (e) { alert("Erro: " + e.message); }
    }
// Monta o chat interativo
    res.innerHTML = `
        <div style="display:flex; flex-direction:column; gap:10px;">
            <div class="chat-bubble bubble-user"><strong>Você:</strong> ${msg.mensagem}</div>
            ${chat && chat.length > 0 
                ? chat.map(c => `<div class="chat-bubble bubble-admin"><strong>Sede:</strong> ${c.mensagem_resposta}</div>`).join('') 
                : "<div style='font-size:12px; color:#666;'>Aguardando resposta da sede...</div>"
            }
        </div>
    `;
}
    
</script>
