layout: default
title: Contato
permalink: /contato/

<section class="secao-contato" style="padding: 40px 5%; max-width: 900px; margin: auto;">
    <div class="titulo-contato" style="text-align: center; margin-bottom: 40px;">
        <h2>Atendimento ao Público</h2>
    </div>

    <div class="card-contato" style="background: #fff; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08);">
        <div style="display: flex; gap: 10px; margin-bottom: 30px; background: #f8f9fa; padding: 5px; border-radius: 12px;">
            <button type="button" onclick="alternarAba('enviar', event)" class="tab-button active" style="flex:1; border:none; padding:12px; border-radius:8px; cursor:pointer;">Enviar Mensagem</button>
            <button type="button" onclick="alternarAba('consultar', event)" class="tab-button" style="flex:1; border:none; padding:12px; border-radius:8px; cursor:pointer;">Consultar Protocolo</button>
        </div>

        <div id="aba-enviar" class="aba-atendimento">
            <form id="form-contato" onsubmit="enviarContato(event)" style="display:flex; flex-direction:column; gap:20px;">
                <div class="form-grupo"><label style="font-weight:600;">Nome</label><input type="text" id="nome" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:8px;" required></div>
                <div class="form-grupo"><label style="font-weight:600;">E-mail</label><input type="email" id="email" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:8px;" required></div>
                <div class="form-grupo"><label style="font-weight:600;">Assunto</label><input type="text" id="assunto" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:8px;" required></div>
                <div class="form-grupo"><label style="font-weight:600;">Mensagem</label><textarea id="mensagem" rows="5" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:8px;" required></textarea></div>
                <button type="submit" class="btn-enviar-contato" style="background:var(--cor-azul); color:white; border:none; padding:15px; border-radius:8px; cursor:pointer; font-weight:bold;">Enviar Mensagem</button>
                <div id="msg-contato-sucesso" class="mensagem-sucesso" style="display:none; padding:10px; margin-top:10px; border-radius:6px;"></div>
            </form>
        </div>

        <div id="aba-consultar" class="aba-atendimento" style="display:none;">
            <h3 style="margin-bottom:20px;">Consultar Status</h3>
            <div class="form-grupo" style="display:flex; gap:10px;">
                <input type="text" id="input-protocolo-consulta" placeholder="Ex: ISMEP123456#" style="flex:1; padding:12px; border:1px solid #ddd; border-radius:8px;">
                <button onclick="executarConsulta()" class="btn-enviar-contato" style="background:var(--cor-azul); color:white; border:none; padding:12px 20px; border-radius:8px; cursor:pointer;">Verificar</button>
            </div>
            <div id="resultado-consulta" style="margin-top:20px; padding:20px; background:#f8f9fa; border-radius:12px;"></div>
        </div>
    </div>
</section>

<style>
    .tab-button { flex: 1; padding: 15px; border: none; background: #f1f5f9; font-weight: bold; cursor: pointer; transition: 0.3s; }
    .tab-button.active { background: var(--cor-azul); color: white; }
    .chat-bubble { padding: 12px 16px; border-radius: 18px; margin-bottom: 10px; font-size: 14px; }
    .bubble-admin { background: var(--cor-azul); color: white; align-self: flex-end; }
    .bubble-user { background: #e2e8f0; color: #1a1a1a; align-self: flex-start; }
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = "https://epiofzncgvmjhpgwrqga.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVwaW9mem5jZ3ZtamhwZ3dycWdhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwOTA2NDAsImV4cCI6MjA5OTY2NjY0MH0.PL_xurBbpf_x34URIH9AT9gewgxZDcow-ptGsxzrhxM";
    const cliente = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function alternarAba(aba, event) {
        document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('aba-enviar').style.display = (aba === 'enviar') ? 'block' : 'none';
        document.getElementById('aba-consultar').style.display = (aba === 'consultar') ? 'block' : 'none';
    }

   async function enviarContato(event) {
    event.preventDefault();
    const protocolo = `ISMEP${Date.now().toString().slice(-6)}#`;
    const btn = event.target.querySelector('button');
    
    try {
        btn.innerText = "Enviando...";
        
        const { error } = await cliente.from('contactos').insert([{ 
            nome: document.getElementById("nome").value, 
            email: document.getElementById("email").value, 
            assunto: document.getElementById("assunto").value, 
            mensagem: document.getElementById("mensagem").value,
            protocolo: protocolo 
        }]);

        if (error) throw error;

        // Correção de segurança: verificar se a div existe
        const msgDiv = document.getElementById("msg-contato-sucesso");
        if (msgDiv) {
            msgDiv.style.display = "block";
            msgDiv.style.backgroundColor = "#def7ec"; // Cor de sucesso
            msgDiv.innerHTML = `Mensagem enviada com sucesso! Protocolo: <strong>${protocolo}</strong>`;
        } else {
            alert("Mensagem enviada! Protocolo: " + protocolo);
        }

        document.getElementById("form-contato").reset();
        btn.innerText = "Enviar Mensagem";

    } catch (e) {
        console.error(e);
        alert("Erro ao enviar: " + e.message);
        btn.innerText = "Enviar Mensagem";
    }
}

    async function executarConsulta() {
        const protocolo = document.getElementById('input-protocolo-consulta').value;
        const res = document.getElementById('resultado-consulta');
        res.innerHTML = "Buscando...";
        
        const { data: msg } = await cliente.from('contactos').select('*').eq('protocolo', protocolo).single();
        const { data: chat } = await cliente.from('respostas').select('*').eq('protocolo', protocolo);

        if (!msg) { res.innerHTML = "Protocolo não encontrado."; return; }
        
        res.innerHTML = `
            <div style="display:flex; flex-direction:column; gap:10px;">
                <div class="chat-bubble bubble-user"><strong>Você:</strong> ${msg.mensagem}</div>
                ${chat && chat.length > 0 
                    ? chat.map(c => `<div class="chat-bubble bubble-admin"><strong>Sede:</strong> ${c.mensagem_resposta}</div>`).join('') 
                    : "<div style='font-size:12px; color:#666;'>Aguardando resposta da sede...</div>"
                }
            </div>`;
    }
</script>
