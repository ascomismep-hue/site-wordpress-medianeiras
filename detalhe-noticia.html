<section style="padding: 60px 5%; max-width: 800px; margin: 0 auto;">
    <div id="noticia-completa">
        <p style="text-align: center;">Carregando conteúdo...</p>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = "https://epiofzncgvmjhpgwrqga.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVwaW9mem5jZ3ZtamhwZ3dycWdhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwOTA2NDAsImV4cCI6MjA5OTY2NjY0MH0.PL_xurBbpf_x34URIH9AT9gewgxZDcow-ptGsxzrhxM"; // Certifique-se de colocar sua chave aqui!
    const cliente = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function carregarDetalhe() {
        const container = document.getElementById("noticia-completa");
        
        // Pega o ID da URL (?id=123)
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        if (!id) {
            container.innerHTML = "<p>Notícia não encontrada.</p>";
            return;
        }

        try {
            // Busca a notícia específica pelo ID
            const { data: n, error } = await cliente
                .from('noticias')
                .select('*')
                .eq('id', id)
                .single();

            if (error) throw error;

            if (n) {
                container.innerHTML = `
                    <h1 style="margin-bottom: 20px;">${n.titulo}</h1>
                    <p style="color:#888; font-size: 14px; margin-bottom: 20px;">
                        Publicado em: ${new Date(n.created_at).toLocaleDateString('pt-BR')}
                    </p>
                    ${n.imagem_url ? `<img src="${n.imagem_url}" style="width:100%; border-radius: 12px; margin-bottom: 30px;">` : ''}
                    <div style="line-height: 1.8; font-size: 18px; color: #333;">
                        ${n.texto ? n.texto.replace(/\n/g, '<br>') : 'Sem conteúdo.'}
                    </div>
                `;
            }
        } catch (err) {
            console.error("Erro ao carregar:", err);
            container.innerHTML = "<p style='color:red;'>Erro ao carregar a notícia. Verifique se a Policy de SELECT no Supabase está ativa.</p>";
        }
    }

    carregarDetalhe();
</script>
